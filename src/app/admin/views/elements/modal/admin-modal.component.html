<div [@pageTransition]>
    <app-modal 
      [show]="showModal" 
      (closeModal)="onModalCloseHandler($event)"
      [ngClass]="getSizeClass()">
      
      <!-- Custom Template -->
      <ng-container *ngIf="config.customTemplate">
        <ng-container *ngTemplateOutlet="config.customTemplate; context: { data: config.data }"></ng-container>
      </ng-container>
  
      <!-- Default Template -->
      <ng-container *ngIf="!config.customTemplate">
        <div class="modal-content">
          <!-- Header -->
          <div class="modal-header" *ngIf="config.title || config.showCloseButton">
            <h3 class="modal-title" *ngIf="config.title">{{ config.title }}</h3>
            <button 
              *ngIf="config.showCloseButton"
              type="button" 
              class="close-button"
              (click)="close()">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
          </div>
  
          <!-- Body -->
          <div class="modal-body">
            <div class="flex items-start">
              <!-- Icon -->
              <div 
                *ngIf="config.type !== 'custom'"
                class="icon-container"
                [ngClass]="getIconBgClass()">
                
                <!-- Info Icon -->
                <svg *ngIf="config.type === 'info'" class="icon" [ngClass]="getIconClass()" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
  
                <!-- Success Icon -->
                <svg *ngIf="config.type === 'success'" class="icon" [ngClass]="getIconClass()" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
  
                <!-- Warning Icon -->
                <svg *ngIf="config.type === 'warning'" class="icon" [ngClass]="getIconClass()" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
  
                <!-- Error Icon -->
                <svg *ngIf="config.type === 'error'" class="icon" [ngClass]="getIconClass()" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
  
                <!-- Confirm Icon -->
                <svg *ngIf="config.type === 'confirm'" class="icon" [ngClass]="getIconClass()" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
              </div>
  
              <!-- Content -->
              <div class="content-container" [ngClass]="{'ml-4': config.type !== 'custom'}">
                <p class="message" *ngIf="config.message">{{ config.message }}</p>
                <ng-content></ng-content>
              </div>
            </div>
          </div>
  
          <!-- Footer -->
          <div class="modal-footer" *ngIf="config.showFooter">
            <button 
              type="button" 
              class="btn btn-secondary"
              [ngClass]="config.secondaryButtonClass"
              (click)="onSecondaryAction()"
              *ngIf="config.secondaryButtonText">
              {{ config.secondaryButtonText }}
            </button>
            <button 
              type="button" 
              class="btn btn-primary"
              [ngClass]="config.primaryButtonClass"
              (click)="onPrimaryAction()"
              *ngIf="config.primaryButtonText">
              {{ config.primaryButtonText }}
            </button>
          </div>
        </div>
      </ng-container>
    </app-modal>
  </div>
