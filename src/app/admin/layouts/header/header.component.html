<header class="bg-white py-3 px-8 shadow-[0_5px_5px_-5px] shadow-gray-200 sticky top-0 admin-navbar">
  <div class="flex justify-between items-center">
    <div class="flex justify-start items-center gap-x-3">
      <!-- Left side can be used for breadcrumbs or page title -->
    </div>
    
    <div class="flex justify-end items-center gap-x-3">
      <!-- Notification Bell -->
      <div class="relative inline-block">
        <button type="button" class="notification-btn">
          <i class="bi bi-bell"></i>
          <span class="notification-badge">3</span>
        </button>
      </div>

      <!-- Profile Dropdown -->
      <div class="relative inline-block profile-dropdown">
        <div class="flex items-center">
          <button type="button" (click)="onClickProfile()" class="profile-trigger">
            <div class="profile-avatar">
              <span class="avatar-text">{{ this.userService.getCurrentUser()?.name?.charAt(0) }}</span>
            </div>
            <div class="profile-info">
              <p class="profile-name">{{ userService.getCurrentUser()?.name }}</p>
              <p class="profile-role">{{ userService.getCurrentUser()?.role }}</p>
            </div>
            <i class="bi bi-chevron-down profile-arrow"></i>
          </button>
        </div>

        <!-- Dropdown Menu -->
        <div class="profile-dropdown-list" aria-expanded="false">
          <!-- User Info Header -->
          <div class="dropdown-header">
            <div class="dropdown-avatar">
              {{ userService.getCurrentUser()?.name?.charAt(0) }}
            </div>
            <div class="dropdown-user-info">
              <div class="dropdown-name-section">
                <span class="dropdown-name">{{ userService.getCurrentUser()?.name }}</span>
                <span class="verified-badge">
                  <i class="bi bi-check2-circle"></i>
                </span>
              </div>
              <div class="dropdown-email">{{ userService.getCurrentUser()?.email }}</div>
            </div>
          </div>

          <div class="dropdown-divider"></div>

          <!-- Menu Items -->
          <div class="dropdown-menu">
            <a href="#" class="dropdown-item">
              <i class="bi bi-person-circle"></i>
              <span>Profile</span>
            </a>
            <a href="#" class="dropdown-item">
              <i class="bi bi-info-circle"></i>
              <span>Help Center</span>
            </a>
          </div>

          <div class="dropdown-divider"></div>

          <!-- Logout -->
          <div class="dropdown-logout">
            <button type="button" (click)="onClickLogout()" class="logout-button">
              <i class="bi bi-power"></i>
              Logout
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
